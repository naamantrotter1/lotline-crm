version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.3
    container_name: lotline_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-lotline_intelligence}
      POSTGRES_USER: ${DB_USER:-lotline}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-lotline_secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-lotline}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: lotline_backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-lotline_intelligence}
      DB_USER: ${DB_USER:-lotline}
      DB_PASSWORD: ${DB_PASSWORD:-lotline_secret}
      CENSUS_API_KEY: ${CENSUS_API_KEY:-}
      BLS_API_KEY: ${BLS_API_KEY:-}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run dev

  frontend:
    build: ./frontend
    container_name: lotline_frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:3001
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host

volumes:
  postgres_data:
