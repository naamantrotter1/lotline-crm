<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LotLine Homes – Available Homes</title>
  <!-- Absolute paths prevent broken CSS/JS when served at /homes vs /homes/index.html -->
  <base href="/homes/" />
  <link rel="stylesheet" href="styles.css?v=6" />
  <style>
    body { margin: 0; padding: 0; background: #f3f4f6; }
    .homes-page { padding: 20px; }
    .homes-page-header {
      margin-bottom: 16px;
    }
  </style>
</head>
<body>

  <div class="homes-page">
    <div class="homes-page-header">
      <h2>Available Homes</h2>
    </div>

    <div class="filters-bar">
      <select class="filter-select" id="filterType">
        <option value="">All Home Types</option>
        <option value="single">Single-Wide (14–18 ft wide)</option>
        <option value="double">Double-Wide (20–32 ft wide)</option>
        <option value="triple">Triple-Wide (45+ ft wide)</option>
      </select>
      <select class="filter-select" id="filterBeds">
        <option value="">Any Bedrooms</option>
        <option value="2">2 Bedrooms</option>
        <option value="3">3 Bedrooms</option>
        <option value="4">4+ Bedrooms</option>
      </select>
      <select class="filter-select" id="filterPrice">
        <option value="">Any Price</option>
        <option value="80000">Up to $80,000</option>
        <option value="120000">Up to $120,000</option>
        <option value="180000">Up to $180,000</option>
        <option value="250000">Up to $250,000</option>
      </select>
      <select class="filter-select" id="filterBrand">
        <option value="">Any Manufacturer</option>
        <option value="Clayton Homes">Clayton Homes</option>
        <option value="Cavco Homes">Cavco Homes</option>
      </select>
      <select class="filter-select" id="filterSort">
        <option value="default">Sort: Featured</option>
        <option value="price-asc">Price: Low to High</option>
        <option value="price-desc">Price: High to Low</option>
        <option value="sqft">Largest First</option>
      </select>
      <span class="results-count" id="resultsCount"></span>
    </div>

    <div class="homes-grid" id="homesGrid"></div>
  </div>

  <!-- MODAL — hidden by default via inline style as CSS fallback -->
  <div class="modal-backdrop" id="modalBackdrop" style="display:none">
    <div class="modal" id="modal">
      <button class="modal-close" id="modalClose">&times;</button>
      <div id="modalContent"></div>
    </div>
  </div>

  <!-- ORDER DRAWER — hidden by default via inline style as CSS fallback -->
  <div class="order-overlay" id="orderOverlay" style="display:none"></div>
  <div class="order-drawer" id="orderDrawer" style="transform:translateX(110%)">
    <div class="drawer-header">
      <span class="drawer-title">Order a Home</span>
      <button class="drawer-close" id="drawerClose">&times;</button>
    </div>
    <div class="order-progress" id="orderProgress">
      <div class="progress-steps">
        <div class="progress-step" id="ps1"></div>
        <div class="progress-step" id="ps2"></div>
        <div class="progress-step" id="ps3"></div>
        <div class="progress-step" id="ps4"></div>
      </div>
      <div class="progress-label" id="progressLabel"></div>
    </div>
    <div class="drawer-body" id="drawerBody"></div>
    <div class="drawer-footer" id="drawerFooter"></div>
  </div>

  <!-- LIGHTBOX -->
  <div id="lightboxOverlay" onclick="closeLightbox()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:9999;align-items:center;justify-content:center;cursor:zoom-out;">
    <button id="lbPrev" onclick="event.stopPropagation();lbNav(-1)" style="display:none;position:absolute;left:20px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,0.15);border:none;color:#fff;font-size:36px;width:52px;height:52px;border-radius:50%;cursor:pointer;align-items:center;justify-content:center;">&#8249;</button>
    <img id="lightboxImg" src="" alt="" onclick="event.stopPropagation()" style="max-width:82vw;max-height:88vh;object-fit:contain;border-radius:8px;box-shadow:0 8px 48px rgba(0,0,0,0.6);cursor:default;">
    <button id="lbNext" onclick="event.stopPropagation();lbNav(1)" style="display:none;position:absolute;right:20px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,0.15);border:none;color:#fff;font-size:36px;width:52px;height:52px;border-radius:50%;cursor:pointer;align-items:center;justify-content:center;">&#8250;</button>
    <button onclick="closeLightbox()" style="position:absolute;top:16px;right:20px;background:rgba(255,255,255,0.15);border:none;color:#fff;font-size:28px;width:44px;height:44px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;">&times;</button>
    <div id="lbCounter" style="display:none;position:absolute;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.5);color:#fff;font-size:13px;padding:4px 12px;border-radius:20px;"></div>
  </div>

  <script src="app.js?v=8"></script>
</body>
</html>
